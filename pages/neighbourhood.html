/* ═══════════════════════════════════════════════
   CLIENT-SIDE SEARCH
═══════════════════════════════════════════════ */
const CAT_KEYWORDS = {
  beaches:['beach','swim','coast','ocean','sea','sand','shore','waves'],
  restaurants:['eat','food','dinner','lunch','restaurant','dining','cuisine','meal','hungry'],
  nightlife:['bar','club','drinks','cocktail','music','party','night','dance','dj'],
  coffee:['coffee','café','cafe','latte','espresso','cappuccino','breakfast','morning','drink'],
  markets:['shop','market','craft','buy','souvenir','fabric','textile'],
  wellness:['spa','massage','yoga','relax','wellness','treatment','hammam','meditation'],
  health:['hospital','clinic','doctor','pharmacy','medicine','medical','emergency','health','sick','ill','prescription','drugs'],
  transport:['taxi','bus','airport','transfer','car','ride','travel','drive'],
  religious:['mosque','church','prayer','worship','religious'],
  banks:['bank','atm','money','cash','exchange','withdraw'],
};

function clientSearch(query, places) {
  const q = query.toLowerCase();
  const tagMatches = (p) => p.tags.some(t => t.toLowerCase().includes(q));
  const descMatch  = (p) => p.description.toLowerCase().includes(q) || p.name.toLowerCase().includes(q);
  const catMatch   = (p) => Object.entries(CAT_KEYWORDS).some(([cat, kws]) =>
    p.category === cat && kws.some(kw => q.includes(kw))
  );
  const scored = places.map(p => ({
    p,
    score: (tagMatches(p) ? 3 : 0) + (descMatch(p) ? 2 : 0) + (catMatch(p) ? 2 : 0)
  }));
  const results = scored.filter(x => x.score > 0).sort((a,b) => b.score - a.score).map(x => x.p);
  if (q.includes('close') || q.includes('near') || q.includes('walk')) {
    return results.length ? results : [...places].sort((a,b) => {
      const d = p => parseInt(p.distance) || 99;
      return d(a) - d(b);
    }).slice(0,6);
  }
  return results;
}

  );
}

function PlaceCard({ place, saved, onSave, highlighted, onEnter, onLeave }) {
  const color = CAT_COLOR[place.category] || '#6fb5a0';
  const catLabel = CATS.find(c=>c.id===place.category)?.label || place.category;
  const isHealth = place.category === 'health';
  const isPharmacy = isHealth && (place.tags.includes('Pharmacy') || place.tags.includes('Prescriptions') || place.tags.includes('OTC Medicines'));

  return (
    <div
      onMouseEnter={onEnter} onMouseLeave={onLeave}
      style={{
        background: highlighted ? 'rgba(255,255,255,.04)' : '#111519',
        border: `1px solid ${highlighted ? color+'44' : 'rgba(255,255,255,.07)'}`,
        boxShadow: highlighted ? `0 0 0 1px ${color}22, 0 8px 32px rgba(0,0,0,.4)` : 'none',
        transition:'all .2s',
        ...(isHealth ? { borderLeft:`3px solid ${color}` } : {}),
      }}
      className="flex flex-col">

      {/* Health type banner */}
      {isHealth && (
        <div style={{background:`${color}12`,borderBottom:`1px solid ${color}22`}}
             className="flex items-center gap-2 px-4 py-1.5">
          <span className="text-sm">{isPharmacy ? '💊' : '🏥'}</span>
          <span className="text-[10px] font-semibold tracking-[.14em] uppercase" style={{color}}>
            {isPharmacy ? 'Pharmacy' : 'Medical Facility'}

          <span className="ml-auto text-[10px] tracking-wider" style={{color:'rgba(232,226,212,.45)'}}>
            {place.distance}

      {/* Card header */}
      <div className="flex items-start justify-between gap-3 px-4 pt-4 pb-2">
        <div className="flex-1 min-w-0">
          {!isHealth && (
            <div className="flex items-center gap-2 mb-1">
              <span className="text-[9px] font-semibold tracking-[.14em] uppercase px-1.5 py-0.5"
                style={{background:`${color}18`,color,border:`1px solid ${color}30`}}>
                {catLabel}
              </span>
              <span className="text-[10px] tracking-wider" style={{color:'rgba(232,226,212,.38)'}}>
                {place.distance}
              </span>
            </div>
          )}
          <h3 className="font-serif text-base font-normal leading-tight" style={{color:'#e8e2d4'}}>
            {place.name}
          </h3>
        </div>
        <button
          onClick={() => onSave(place.id)}
          title={saved ? 'Remove from My List' : 'Save to My List'}
          className="flex-shrink-0 w-7 h-7 flex items-center justify-center transition-all"
          style={{
            background: saved ? `${color}22` : 'transparent',
            border: `1px solid ${saved ? color+'60' : 'rgba(255,255,255,.1)'}`,
            color: saved ? color : 'rgba(232,226,212,.35)',
          }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill={saved ? 'currentColor' : 'none'}
            stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </div>

      {/* Description */}
      <p className="px-4 pb-3 text-sm leading-relaxed flex-1" style={{color:'rgba(232,226,212,.6)'}}>
        {place.description}
      </p>

      {/* Tags */}
      <div className="flex flex-wrap gap-1.5 px-4 pb-3">
        {place.tags.map(tag => (
          <span key={tag} className="text-[10px] tracking-wider px-2 py-0.5"

            {tag}

      {/* Action bar */}
      <div className="flex border-t" style={{borderColor:'rgba(255,255,255,.06)'}}>

          className="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-[10px] font-semibold tracking-[.12em] uppercase transition-colors"
          style={{color,borderRight:'1px solid rgba(255,255,255,.06)'}}
          onMouseOver={e=>e.currentTarget.style.background=`${color}12`}
          onMouseOut={e=>e.currentTarget.style.background='transparent'}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"/>
          </svg>
          Get Directions
        </a>
        <button onClick={() => onSave(place.id)}
          className="flex items-center justify-center gap-1.5 px-4 text-[10px] font-semibold tracking-[.12em] uppercase transition-colors"
          style={{color: saved ? color : 'rgba(232,226,212,.35)'}}

/* ═══════════════════════════════════════════════
   MAIN WIDGET
═══════════════════════════════════════════════ */
function NeighbourhoodGuide() {
  const [activeCat, setActiveCat]         = useState('all');
  const [results, setResults]             = useState(PLACES);
  const [searchInput, setSearchInput]     = useState('');
  const [loading, setLoading]             = useState(false);
  const [error, setError]                 = useState('');
  const [savedIds, setSavedIds]           = useState(new Set());
  const [highlightedId, setHighlightedId] = useState(null);
  const [apiKey, setApiKey]               = useState('');
  const [showKeyPanel, setShowKeyPanel]   = useState(false);
  const [aiMode, setAiMode]               = useState(false);
  const [activeFilters, setActiveFilters] = useState(new Set());
  const inputRef = useRef(null);

  const displayResults = (activeCat === 'all' ? results : results.filter(p => p.category === activeCat))
    .filter(p => activeFilters.size === 0 || [...activeFilters].some(f => p.tags.includes(f)));

  const allTags = [...new Set(
    (activeCat === 'all' ? results : results.filter(p=>p.category===activeCat)).flatMap(p=>p.tags)
  )].slice(0, 14);

  const showHealthBanner = activeCat === 'health' || activeCat === 'all';

  const handleSearch = useCallback(async () => {
    const q = searchInput.trim();
    if (!q) return;
    setLoading(true);
    setError('');

    if (apiKey) {
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 2048,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: q }],
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({}));
          throw new Error(err?.error?.message || `HTTP ${res.status}`);
        }
        const data = await res.json();
        const text = data.content?.[0]?.text || '';
        const jsonMatch = text.match(/\[[\s\S]*?\]/);
        if (!jsonMatch) throw new Error('Model returned unexpected format.');
        const parsed = JSON.parse(jsonMatch[0]);
        const mapped = parsed.map((p, i) => ({
          id: `ai-${Date.now()}-${i}`,
          name: p.name || 'Unknown',
          category: p.category || 'restaurants',
          distance: p.distance || '~nearby',
          description: p.description || '',
          tags: Array.isArray(p.tags) ? p.tags : [],
          coords: PLACES.find(mp =>
            mp.name.toLowerCase().includes((p.name||'').split(' ')[0]?.toLowerCase())
          )?.coords || { x: 240 + (i%4)*18, y: 155 + Math.floor(i/4)*30 },
        }));
        setResults(mapped);
        setAiMode(true);
        setActiveCat('all');
        setActiveFilters(new Set());
      } catch (err) {
        console.warn('API error, falling back to local search:', err);
        const local = clientSearch(q, PLACES);
        setResults(local.length ? local : PLACES);
        setAiMode(false);
        setError(`AI concierge unavailable (${err.message}). Showing filtered results instead.`);
      }
    } else {
      const local = clientSearch(q, PLACES);
      setResults(local.length ? local : PLACES);
      setAiMode(false);
      if (!local.length) setError('No matches found — showing all places.');
    }
    setLoading(false);
  }, [searchInput, apiKey]);

  const resetSearch = () => {
    setResults(PLACES);
    setSearchInput('');
    setAiMode(false);
    setError('');
    setActiveFilters(new Set());
    inputRef.current?.focus();
  };

  const toggleSave = (id) => {
    setSavedIds(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  };

  const toggleFilter = (tag) => {
    setActiveFilters(prev => { const n=new Set(prev); n.has(tag)?n.delete(tag):n.add(tag); return n; });
  };

  return (
    <div className="min-h-screen font-sans" style={{background:'#0a0d0f',color:'#e8e2d4'}}>

      {/* ── HEADER ── */}
      <div style={{background:'rgba(10,13,15,.97)',borderBottom:'1px solid rgba(255,255,255,.07)'}}
           className="sticky top-0 z-50 flex items-center justify-between px-4 sm:px-8 py-4">
        <div className="flex items-center gap-3">
          <a href="../index.html" className="brand-logo" aria-label="Ocean Breeze Luxury Apartments home">
            <img src="../assets/logo/oceanbreeze-logo.webp" alt="Ocean Breeze Luxury Apartments" width="184" height="48" loading="lazy" decoding="async" />
          </a>
          <span className="hidden sm:block text-[10px] tracking-[.18em] uppercase px-2 py-0.5"
            style={{background:'rgba(111,181,160,.1)',border:'1px solid rgba(111,181,160,.2)',color:'#6fb5a0'}}>
            Neighbourhood Guide
          </span>
        </div>
        <div className="flex items-center gap-3">
          {savedIds.size > 0 && (
            <span className="text-[10px] font-semibold tracking-wider uppercase flex items-center gap-1.5"
              style={{color:'#6fb5a0'}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
              </svg>
              {savedIds.size} saved
            </span>
          )}
          <button onClick={() => setShowKeyPanel(!showKeyPanel)}
            className="flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-semibold tracking-[.12em] uppercase transition-all"
            style={{
              background: apiKey ? 'rgba(111,181,160,.12)' : 'transparent',
              border: `1px solid ${apiKey ? 'rgba(111,181,160,.3)' : 'rgba(255,255,255,.1)'}`,
              color: apiKey ? '#6fb5a0' : 'rgba(232,226,212,.5)',
            }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
            {apiKey ? 'AI Active' : 'Add API Key'}
          </button>
          {aiMode && (
            <button onClick={resetSearch}
              className="text-[10px] font-semibold tracking-wider uppercase px-2 py-1.5 transition-colors"
              style={{color:'rgba(232,226,212,.4)',border:'1px solid rgba(255,255,255,.07)'}}>
              Reset
            </button>
          )}
        </div>
      </div>

      {/* ── API KEY PANEL ── */}
      {showKeyPanel && (
        <div style={{background:'#111519',borderBottom:'1px solid rgba(111,181,160,.2)'}}
             className="px-4 sm:px-8 py-4 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
          <div className="flex-1 flex flex-col gap-1.5 w-full sm:max-w-md">
            <label className="text-[9px] font-semibold tracking-[.16em] uppercase" style={{color:'#6fb5a0'}}>
              Anthropic API Key — enables real AI recommendations
            </label>
            <div className="flex gap-2">
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
                placeholder="sk-ant-..."
                className="flex-1 text-sm px-3 py-2 outline-none"
                style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.1)',color:'#e8e2d4'}}
              />
              <button onClick={()=>setShowKeyPanel(false)}
                className="px-4 text-[10px] font-semibold tracking-wider uppercase"
                style={{background:'#6fb5a0',color:'#0a0d0f'}}>
                Done
              </button>
            </div>
          </div>
          <p className="text-[10px] leading-relaxed sm:max-w-xs" style={{color:'rgba(232,226,212,.4)'}}>
            Without a key, smart local search runs on curated data. With a key, Concierge AI delivers live, personalised recommendations. Your key stays in-browser only.
          </p>
        </div>
      )}

      <div className="max-w-screen-xl mx-auto px-4 sm:px-6 py-6">

        {/* ── SEARCH BAR ── */}
        <div className="mb-6">
          <div className="text-center mb-5">
            <div className="text-[10px] font-semibold tracking-[.2em] uppercase mb-1.5" style={{color:'#6fb5a0'}}>
              — Bijilo, The Gambia —
            </div>
            <h1 className="font-serif font-light" style={{fontSize:'clamp(1.5rem,4vw,2.4rem)',color:'#e8e2d4',lineHeight:1.1}}>
              Your neighbourhood, <em style={{color:'#6fb5a0',fontStyle:'italic'}}>curated.</em>
            </h1>
          </div>
          <div className="max-w-2xl mx-auto flex gap-0"
               style={{background:'#111519',border:'1px solid rgba(255,255,255,.1)',boxShadow:'0 16px 40px rgba(0,0,0,.4)'}}>
            <input ref={inputRef} value={searchInput} onChange={e=>setSearchInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter' && handleSearch()}
              placeholder={apiKey ? 'Ask the concierge — "nearest pharmacy", "romantic dinner", "closest beach"…' : '"nearest pharmacy", "romantic dinner", "closest beach", "hospital"…'}
              className="flex-1 px-5 py-3.5 text-sm bg-transparent outline-none"
              style={{color:'#e8e2d4',minWidth:0}}
            />
            {searchInput && (
              <button onClick={resetSearch} className="px-3 text-xs"
                style={{color:'rgba(232,226,212,.3)'}} title="Clear">✕</button>
            )}
            <button onClick={handleSearch} disabled={loading || !searchInput.trim()}
              className="px-5 sm:px-7 flex items-center gap-2 text-[10px] font-semibold tracking-[.12em] uppercase transition-all disabled:opacity-40"
              style={{background:'#6fb5a0',color:'#0a0d0f',minWidth:100}}>
              {loading ? (
                <svg className="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              ) : (
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              )}
              <span className="hidden sm:inline">{loading ? 'Asking…' : 'Search'}</span>
            </button>
          </div>
          {aiMode && (
            <div className="max-w-2xl mx-auto mt-2 flex items-center gap-2 px-4 py-2"
              style={{background:'rgba(111,181,160,.07)',border:'1px solid rgba(111,181,160,.2)',borderTop:'none'}}>
              <span className="w-1.5 h-1.5 rounded-full bg-[#6fb5a0] flex-shrink-0 animate-pulse"/>
              <span className="text-[10px] tracking-wider" style={{color:'rgba(111,181,160,.8)'}}>
                AI concierge results for "{searchInput}" · {displayResults.length} recommendations
              </span>
              <button onClick={resetSearch} className="ml-auto text-[10px] underline" style={{color:'rgba(111,181,160,.6)'}}>
                Show all
              </button>
            </div>
          )}
          {error && (
            <div className="max-w-2xl mx-auto mt-2 px-4 py-2 text-[10px]"
              style={{background:'rgba(224,108,108,.07)',border:'1px solid rgba(224,108,108,.2)',borderTop:'none',color:'rgba(224,108,108,.8)'}}>
              {error}
            </div>
          )}
        </div>

        {/* MOBILE: Category horizontal scroll */}
        <div className="md:hidden mb-4" style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          <div className="flex gap-1.5 pb-1" style={{width:'max-content'}}>
            {CATS.map(cat => (
              <button key={cat.id} onClick={()=>{setActiveCat(cat.id);setActiveFilters(new Set());}}
                className="flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-medium tracking-wider whitespace-nowrap"
                style={{
                  background: activeCat===cat.id ? `${cat.color}22` : 'rgba(255,255,255,.04)',
                  border: `1px solid ${activeCat===cat.id ? cat.color+'50' : 'rgba(255,255,255,.08)'}`,

        </div>

        {/* ── TWO-COLUMN LAYOUT ── */}

                  style={{
                    background: activeCat===cat.id ? `${cat.color}14` : 'transparent',
                    borderLeft: activeCat===cat.id ? `2px solid ${cat.color}` : '2px solid transparent',
                    color: activeCat===cat.id ? cat.color : 'rgba(232,226,212,.55)',
                  }}>
                  <span style={{fontSize:12}}>{cat.emoji}</span>
                  <span>{cat.label}</span>
                  <span className="ml-auto text-[9px]" style={{color:'rgba(232,226,212,.25)'}}>
                    {cat.id==='all' ? PLACES.length : PLACES.filter(p=>p.category===cat.id).length}
                  </span>
                </button>
              ))}
            </div>

            {allTags.length > 0 && (
              <>
                <div className="text-[9px] font-semibold tracking-[.16em] uppercase mb-2" style={{color:'rgba(232,226,212,.35)'}}>
                  Filter by Tag
                </div>
                <div className="flex flex-col gap-1">
                  {allTags.map(tag => {
                    const active = activeFilters.has(tag);
                    const color = CAT_COLOR[activeCat] || '#6fb5a0';

                        className="text-left text-[10px] px-2.5 py-1.5 tracking-wide transition-all"
                        style={{

                      className="text-[9px] tracking-wider uppercase mt-1"

                  </div>
                  <p className="text-[11px] leading-relaxed" style={{color:'rgba(232,226,212,.6)'}}>

                      style={{color:'#25d366',textDecoration:'none'}}>+220 722 6060</a>{' '}
                    for the fastest response. Always carry your travel insurance details when visiting clinics.
                  </p>
                </div>
              </div>
            )}

            {/* Result count */}
            <div className="flex items-center justify-between mb-3">
              <span className="text-[10px] tracking-wider uppercase" style={{color:'rgba(232,226,212,.35)'}}>
                {displayResults.length} {displayResults.length===1?'place':'places'}
                {activeCat!=='all' ? ` · ${CATS.find(c=>c.id===activeCat)?.label}` : ''}
                {activeFilters.size>0 ? ` · ${activeFilters.size} filter${activeFilters.size>1?'s':''}` : ''}
              </span>
              {aiMode && (
                <span className="text-[9px] font-semibold tracking-[.12em] uppercase flex items-center gap-1"
                  style={{color:'#6fb5a0'}}>
                  <span className="w-1 h-1 rounded-full bg-[#6fb5a0] animate-pulse"/>
                  Powered by Concierge AI
                </span>
              )}
            </div>

            {displayResults.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-16 text-center"
                style={{border:'1px dashed rgba(255,255,255,.08)'}}>
                <div className="text-2xl mb-3 opacity-40">🔍</div>
                <div className="font-serif text-lg font-light mb-1" style={{color:'rgba(232,226,212,.5)'}}>No results</div>
                <div className="text-sm" style={{color:'rgba(232,226,212,.3)'}}>Try a different search or category</div>
                <button onClick={resetSearch} className="mt-4 text-[10px] font-semibold tracking-wider uppercase px-4 py-2"
                  style={{border:'1px solid rgba(111,181,160,.3)',color:'#6fb5a0'}}>
                  Show All Places
                </button>
              </div>
            ) : (
              <div className="grid gap-3"
                style={{gridTemplateColumns:'repeat(auto-fill,minmax(min(100%,280px),1fr))'}}>
                {displayResults.map(place => (
                  <PlaceCard key={place.id} place={place}
                    saved={savedIds.has(place.id)}
                    onSave={toggleSave}
                    highlighted={highlightedId===place.id}
                    onEnter={()=>setHighlightedId(place.id)}
                    onLeave={()=>setHighlightedId(null)}
                  />
                ))}
              </div>
            )}
          </div>
        </div>

        {/* ── MAP SECTION ── */}
        <div className="mt-8">
          <div className="flex items-end justify-between mb-3">
            <div>
              <div className="text-[9px] font-semibold tracking-[.18em] uppercase mb-0.5" style={{color:'#6fb5a0'}}>
                Interactive Map
              </div>
              <h2 className="font-serif font-light text-xl" style={{color:'#e8e2d4'}}>
                Bijilo &amp; surroundings.
              </h2>
            </div>
            <div className="text-[10px]" style={{color:'rgba(232,226,212,.3)'}}>
              Health pins show ✚ · Click pins to highlight · Hover cards to locate
            </div>
          </div>
          <BijiloMap
            places={displayResults}
            activeCat={activeCat}
            highlightedId={highlightedId}
            onPinClick={(id) => setHighlightedId(prev => prev===id ? null : id)}
          />
        </div>

        {/* ── FOOTER ── */}
        <div className="mt-6 flex flex-col sm:flex-row items-center justify-between gap-3 pt-4"
          style={{borderTop:'1px solid rgba(255,255,255,.05)'}}>
          <div className="flex items-center gap-3">
            <a href="../index.html" className="text-[10px] tracking-wider flex items-center gap-1.5 transition-colors"
              style={{color:'rgba(232,226,212,.4)'}}
              onMouseOver={e=>e.currentTarget.style.color='#6fb5a0'}
              onMouseOut={e=>e.currentTarget.style.color='rgba(232,226,212,.4)'}>
              ← Back to Site
            </a>
            <span className="text-[10px] tracking-wide flex items-center gap-1.5" style={{color:'rgba(232,226,212,.3)'}}>
              <span className="w-1.5 h-1.5 rounded-full animate-pulse" style={{background:'#6fb5a0'}}/>
              Neighbourhood data curated for Ocean Breeze residents · Bijilo, The Gambia
            </span>
          </div>
          <div className="flex items-center gap-3">
            <a href="tel:+2207226060" className="text-[10px] tracking-wider transition-colors"
              style={{color:'rgba(232,226,212,.35)'}}
              onMouseOver={e=>e.target.style.color='#6fb5a0'}
              onMouseOut={e=>e.target.style.color='rgba(232,226,212,.35)'}>
              +220 722 6060
            </a>
            <a href="https://wa.me/2207226060" target="_blank" rel="noopener"
              className="flex items-center gap-1.5 px-3 py-1.5 text-[10px] font-semibold tracking-wider uppercase"
              style={{background:'rgba(37,211,102,.12)',border:'1px solid rgba(37,211,102,.25)',color:'#25d366'}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
              </svg>
              WhatsApp Concierge
            </a>
          </div>
        </div>
        <div className="text-center mt-4 pb-2">
          <a href="https://umojaserv.com/" target="_blank" rel="noopener"
            style={{fontSize:'.58rem',letterSpacing:'.06em',color:'rgba(232,226,212,.18)',textDecoration:'none',transition:'color .3s'}}
            onMouseOver={e=>e.currentTarget.style.color='rgba(232,226,212,.4)'}
            onMouseOut={e=>e.currentTarget.style.color='rgba(232,226,212,.18)'}>
            Site by https://umojaserv.com/
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<NeighbourhoodGuide />);
</script>
